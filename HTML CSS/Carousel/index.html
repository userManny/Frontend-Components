<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawsel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     
    <section class="crawsel-section">
      <h2 class="crawsel-heading">Carousel</h2>

        <div class="crawsel-wrapper">

         <button class="next">❯</button>
        </div>

        <div class="dot-container"></div>
       
    </section>


    <script src="script.js"></script>
</body>
</html>
